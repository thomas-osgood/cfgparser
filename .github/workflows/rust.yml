name: Rust

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Triggers on tags like v1.0.0

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Linux
      run: cargo build --release --verbose
    - name: Run tests
      run: cargo test --verbose

  build_windows:

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build Windows
        run: cargo build --release --verbose
      - name: Run Tests
        run: cargo test --verbose
